<!DOCTYPE html>
<html>
<head>
    <title>Smart Grocery App</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .item { margin: 10px 0; }
    </style>
    <script>
        function searchFunction() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const items = document.getElementsByClassName('item');

            for (let i = 0; i < items.length; i++) {
                const itemName = items[i].getElementsByClassName('item-name')[0];
                if (itemName) {
                    const textValue = itemName.textContent || itemName.innerText;
                    items[i].style.display = textValue.toLowerCase().includes(searchInput) ? '' : 'none';
                }       
            }
        }

        function updateQuantity(itemIndex) {
            const quantityInput = document.getElementById('quantity' + itemIndex);
            const quantity = quantityInput.value;
            const unitInput = document.getElementById('unit' + itemIndex);
            const unit = unitInput.value;
            alert(`You have selected ${quantity} ${unit} of ${items[itemIndex].name}.`);
        }
    </script>
</head>
<body>
    <h1>Smart Grocery App</h1>
    <input type="text" id="searchInput" onkeyup="searchFunction()" placeholder="Search for items...">

    <div class="item-list">
        <div class="item">
            <span class="item-name">Apple</span>
            <input type="number" id="quantity0" placeholder="Qty">
            <select id="unit0">
                <option value="g">g</option>
                <option value="kg">kg</option>
                <option value="ml">ml</option>
                <option value="l">l</option>
                <option value="packets">packets</option>
            </select>
            <button onclick="updateQuantity(0)">Select</button>
        </div>
        <div class="item">
            <span class="item-name">Milk</span>
            <input type="number" id="quantity1" placeholder="Qty">
            <select id="unit1">
                <option value="g">g</option>
                <option value="kg">kg</option>
                <option value="ml">ml</option>
                <option value="l">l</option>
                <option value="packets">packets</option>
            </select>
            <button onclick="updateQuantity(1)">Select</button>
        </div>
        <!-- Add more items as needed -->
    </div>
</body>
</html>
